[versions]
androidMinSdk = "23"
androidTargetSdk = "36"
androidCompileSdk = "36"

jvmTarget = "17"

libVersion = "6.2.0"

kotlin = "2.3.20"
agp = "9.0.1"

detekt = "1.23.8"
detektCompose = "0.5.6"

#noinspection NewerVersionAvailable
composeCharts = "0.1.11"

appCompat = "1.7.1"
androidxCore = "1.18.0"
desugaring = "2.1.5"

material3 = "1.5.0-alpha17"
composeVersion = "1.11.0-beta02"

okhttp = "5.3.2"
coil = "3.4.0"

activityCompose = "1.13.0"
androidAnimation = "3.0.5"
vectordrawableAnimated = "1.2.0"

heifwriter = "1.1.0"
exifinterface = "1.4.2"
transition = "1.7.0"

[libraries]
androidx-heifwriter = { module = "androidx.heifwriter:heifwriter", version.ref = "heifwriter" }

androidx-vectordrawable-animated = { module = "androidx.vectordrawable:vectordrawable-animated", version.ref = "vectordrawableAnimated" }
animation-awebp = { module = "com.github.penfeizhou.android.animation:awebp", version.ref = "androidAnimation" }
animation-awebp-encoder = { module = "com.github.penfeizhou.android.animation:awebpencoder", version.ref = "androidAnimation" }
animation-avif = { module = "com.github.penfeizhou.android.animation:avif", version.ref = "androidAnimation" }

transition = { module = "androidx.transition:transition", version.ref = "transition" }
exifinterface = { module = "androidx.exifinterface:exifinterface", version.ref = "exifinterface" }

androidx-material3 = { module = "androidx.compose.material3:material3", version.ref = "material3" }
compose-charts = { module = "io.github.ehsannarmani:compose-charts", version.ref = "composeCharts" }
desugaring = { module = "com.android.tools:desugar_jdk_libs", version.ref = "desugaring" }
detekt-formatting = { module = "io.gitlab.arturbosch.detekt:detekt-formatting", version.ref = "detekt" }
detekt-compose = { module = "io.nlopez.compose.rules:detekt", version.ref = "detektCompose" }

appCompat = { module = "androidx.appcompat:appcompat", version.ref = "appCompat" }
androidxCore = { module = "androidx.core:core-ktx", version.ref = "androidxCore" }

coil = { module = "io.coil-kt.coil3:coil", version.ref = "coil" }
coil-svg = { module = "io.coil-kt.coil3:coil-svg", version.ref = "coil" }
coil-compose = { module = "io.coil-kt.coil3:coil-compose", version.ref = "coil" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }

compose-ui = { group = "androidx.compose.ui", name = "ui", version.ref = "composeVersion" }
compose-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics", version.ref = "composeVersion" }

androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }
androidx-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview", version.ref = "composeVersion" }

kotlin-gradle = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
agp-gradle = { module = "com.android.tools.build:gradle", version.ref = "agp" }
detekt-gradle = { module = "io.gitlab.arturbosch.detekt:detekt-gradle-plugin", version.ref = "detekt" }
compose-compiler-gradle = { module = "org.jetbrains.kotlin:compose-compiler-gradle-plugin", version.ref = "kotlin" }

[plugins]
image-toolbox-library = { id = "image.toolbox.library", version = "unspecified" }
image-toolbox-compose = { id = "image.toolbox.compose", version = "unspecified" }
image-toolbox-maven = { id = "image.toolbox.maven", version = "unspecified" }